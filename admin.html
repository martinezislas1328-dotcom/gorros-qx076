<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Maestro | Gorros QX076</title>
    <style>
        :root { --vino: #850E35; --rosa: #EE6983; --hueso: #FCF5EE; --azul-match: #2980b9; --verde-gallery: #27ae60; }
        body { font-family: 'Montserrat', sans-serif; background: var(--hueso); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; border-top: 5px solid var(--vino); }
        h2 { color: var(--vino); margin: 0 0 20px 0; font-size: 1.5rem; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-guardar { background: var(--vino); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; margin-top: 10px;}
        .btn-guardar:hover { opacity: 0.9; transform: translateY(-2px); }
        .producto-item { background: white; padding: 15px; margin-bottom: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid var(--vino); }
        .info-admin { display: flex; align-items: center; gap: 15px; }
        .info-admin img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }
        .controles { display: flex; gap: 8px; align-items: center;}
        
        .btn-edit { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .btn-edit:hover { background: #2980b9; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .btn-del:hover { background: #c0392b; }
        
        .stock-input { width: 60px !important; text-align: center; margin: 0 !important; padding: 5px !important; border-radius: 5px; border: 1px solid #ccc;}
        .oferta-input { border: 2px solid var(--rosa) !important; background: #fff5f7; }
        .input-nuevo { display: none; border-color: var(--rosa); background-color: #fff5f7; margin-top: 5px; }
        
        /* Botón para añadir inputs dinámicos */
        .btn-add-foto { background: #eee; color: #333; border: 1px dashed #aaa; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; transition: 0.2s; }
        .btn-add-foto:hover { background: #ddd; }
    </style>
</head>
<body>

<div class="container">

    <div class="panel" id="form-panel">
        <h2 id="titulo-form">✨ Añadir Nuevo Gorro (Individual)</h2>
        <input type="hidden" id="edit-id"> 
        <input type="hidden" id="edit-cat"> 
        
        <label>Nombre del Gorro</label>
        <input type="text" id="nombre" placeholder="Ej: Ariel - La Sirenita">
        
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Precio Normal ($)</label>
                <input type="number" id="precio" placeholder="120">
            </div>
            <div style="flex: 1;">
                <label>Precio Oferta (Opcional)</label>
                <input type="number" id="precioOferta" class="oferta-input" placeholder="Ej: 100">
            </div>
        </div>
        
        <label>URL de la Imagen (Postimg)</label>
        <input type="text" id="imagen" placeholder="https://i.postimg.cc/...">
        
        <label>Categoría Principal</label>
        <select id="categoria" onchange="verificarNuevos()">
            <option value="Toons_Icons">Personajes Animados (Toons)</option>
            <option value="Art_Masterpieces">Arte y Cuadros (Art)</option>
            <option value="Marble_Luxury">Línea Mármol (Marble Luxury)</option>
            <option value="Nature_Wildlife">Animales y Flores</option>
            <option value="Essentials">Básicos y Corazones</option>
            <option value="NUEVA" style="font-weight:bold; color:var(--vino);">➕ Añadir Nueva Categoría...</option>
        </select>
        <input type="text" id="nueva-cat-input" class="input-nuevo" placeholder="Escribe la nueva categoría...">

        <label>Sub-clasificación</label>
        <select id="subcategoria" onchange="verificarNuevos()">
            <option value="Todos">Ninguna / Otros</option>
            <option value="Stitch">Stitch</option>
            <option value="Snoopy">Snoopy</option>
            <option value="Princesas">Princesas</option>
            <option value="Bob Esponja">Bob Esponja</option>
            <option value="NUEVA" style="font-weight:bold; color:var(--vino);">➕ Añadir Nueva Subcategoría...</option>
        </select>
        <input type="text" id="nueva-sub-input" class="input-nuevo" placeholder="Escribe la nueva subcategoría...">

        <label>Stock</label>
        <input type="number" id="stock" value="10">

        <button class="btn-guardar" onclick="guardarProducto()" id="btn-main">Publicar Producto</button>
        <button id="btn-cancel" style="display:none; background:#999; margin-top:10px; border:none; color:white; padding:10px; border-radius:8px; width:100%; cursor:pointer;" onclick="cancelarEdicion()">Cancelar Edición</button>
    </div>

    <div class="panel" style="border-top-color: var(--azul-match);">
        <h2 id="titulo-form-match" style="color:var(--azul-match)">🔥 Añadir Paquete MATCH (Equipos)</h2>
        <input type="hidden" id="edit-match-id"> 

        <label>Nombre del Squad</label>
        <input type="text" id="match-nombre" placeholder="Ej: Ositos Cariñositos">
        
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Precio Normal ($ MXN)</label>
                <input type="number" id="match-precio" placeholder="Ej: 880">
            </div>
            <div style="flex: 1;">
                <label>Precio Oferta (Opcional)</label>
                <input type="number" id="match-precio-oferta" class="oferta-input" placeholder="Ej: 750">
            </div>
            <div style="flex: 1;">
                <label>Stock (Unidades)</label>
                <input type="number" id="match-stock" value="10">
            </div>
        </div>

        <label>URL Foto Grupal (Principal - Portada)</label>
        <input type="text" id="match-imagen" placeholder="https://i.postimg.cc/...">
        
        <label style="color: var(--vino); font-size: 0.95rem; margin-top: 15px;">📸 Fotos Extra (Para cuadritos del Modal)</label>
        
        <div id="contenedor-fotos-extra">
            </div>
        <button type="button" class="btn-add-foto" onclick="agregarInputFotoExtra()">➕ Añadir otra foto al paquete</button>

        <label style="margin-top: 15px;">Descripción Completa del Paquete</label>
        <textarea id="match-desc" rows="3" placeholder="Ej: Incluye 8 gorros variados de los ositos cariñositos..."></textarea>
        
        <button class="btn-guardar" style="background:var(--azul-match)" id="btn-match-main" onclick="guardarMatch()">Publicar Paquete Match</button>
        <button id="btn-match-cancel" style="display:none; background:#999; margin-top:10px; border:none; color:white; padding:10px; border-radius:8px; width:100%; cursor:pointer;" onclick="cancelarEdicionMatch()">Cancelar Edición</button>
    </div>

    <div class="panel" style="border-top-color: var(--verde-gallery);">
        <h2 style="color:var(--verde-gallery)">📸 Añadir Foto a la Galería VIP (Clientes)</h2>
        <label>URL de la Foto del Cliente</label>
        <input type="text" id="galeria-imagen" placeholder="https://i.postimg.cc/...">
        <button class="btn-guardar" style="background:var(--verde-gallery)" onclick="guardarFotoGaleria()">Subir Foto a la Galería</button>
    </div>

    <div class="panel">
        <h2>📦 Inventario Completo</h2>
        <h3 style="color: var(--vino); margin-top: 20px; border-bottom: 2px solid #eee; padding-bottom: 5px;">Gorros Individuales</h3>
        <div id="lista-inventario">Cargando...</div>

        <h3 style="color: var(--azul-match); margin-top: 40px; border-bottom: 2px solid #eee; padding-bottom: 5px;">Colección Match (Paquetes)</h3>
        <div id="lista-match">Cargando...</div>

        <h3 style="color: var(--verde-gallery); margin-top: 40px; border-bottom: 2px solid #eee; padding-bottom: 5px;">Galería de Fotos</h3>
        <div id="lista-galeria">Cargando...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDjJGxz3rqwKRY1mQsakSqJPGVfF_rYdp0",
        authDomain: "gorrosqx.firebaseapp.com",
        databaseURL: "https://gorrosqx-default-rtdb.firebaseio.com",
        projectId: "gorrosqx",
        storageBucket: "gorrosqx.firebasestorage.app"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let cacheMatches = {}; 

    /* ========================================================
       LÓGICA GORROS INDIVIDUALES (Intacta)
       ======================================================== */
    function verificarNuevos() {
        const cat = document.getElementById('categoria').value;
        const sub = document.getElementById('subcategoria').value;
        document.getElementById('nueva-cat-input').style.display = cat === 'NUEVA' ? 'block' : 'none';
        document.getElementById('nueva-sub-input').style.display = sub === 'NUEVA' ? 'block' : 'none';
    }

    function guardarProducto() {
        const idExistente = document.getElementById('edit-id').value;
        const catAnterior = document.getElementById('edit-cat').value;
        const nombre = document.getElementById('nombre').value;
        const precio = document.getElementById('precio').value;
        const precioOferta = document.getElementById('precioOferta').value;
        const imagen = document.getElementById('imagen').value;
        const stock = document.getElementById('stock').value;

        let cat = document.getElementById('categoria').value;
        if(cat === 'NUEVA') cat = document.getElementById('nueva-cat-input').value.trim().replace(/\s+/g, '_');
        let sub = document.getElementById('subcategoria').value;
        if(sub === 'NUEVA') sub = document.getElementById('nueva-sub-input').value.trim();

        if(!nombre || !precio || !imagen) return alert("Completa los datos");
        if(idExistente && catAnterior !== cat) db.ref('Productos/' + catAnterior + '/' + idExistente).remove();

        const idFinal = idExistente || nombre.replace(/\s+/g, '_').toLowerCase();

        db.ref('Productos/' + cat + '/' + idFinal).set({
            Nombre: nombre, precio: precio, precioOferta: precioOferta || "",
            imagen: imagen, categoria: cat, subcategoria: sub, stock: parseInt(stock)
        }).then(() => { alert("¡Gorro guardado!"); cancelarEdicion(); });
    }

    function cargarEdicion(cat, id, data) {
        document.getElementById('titulo-form').innerText = "📝 Editando: " + data.Nombre;
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-cat').value = cat;
        document.getElementById('nombre').value = data.Nombre;
        document.getElementById('precio').value = data.precio;
        document.getElementById('precioOferta').value = data.precioOferta || "";
        document.getElementById('imagen').value = data.imagen;
        
        const selectCat = document.getElementById('categoria');
        if(!Array.from(selectCat.options).some(opt => opt.value === cat)) selectCat.innerHTML += `<option value="${cat}">${cat.replace(/_/g, ' ')}</option>`;
        selectCat.value = cat;

        const subReal = data.subcategoria || "Todos";
        const selectSub = document.getElementById('subcategoria');
        if(!Array.from(selectSub.options).some(opt => opt.value === subReal)) selectSub.innerHTML += `<option value="${subReal}">${subReal}</option>`;
        selectSub.value = subReal;

        document.getElementById('stock').value = data.stock !== undefined ? data.stock : 10;
        document.getElementById('btn-main').innerText = "Guardar Cambios";
        document.getElementById('btn-cancel').style.display = "block";
        verificarNuevos(); window.scrollTo(0,0); 
    }

    function cancelarEdicion() {
        document.getElementById('titulo-form').innerText = "✨ Añadir Nuevo Gorro (Individual)";
        document.getElementById('edit-id').value = ""; document.getElementById('edit-cat').value = "";
        document.getElementById('nombre').value = ""; document.getElementById('precio').value = "";
        document.getElementById('precioOferta').value = ""; document.getElementById('imagen').value = "";
        document.getElementById('categoria').value = "Toons_Icons"; document.getElementById('subcategoria').value = "Todos";
        document.getElementById('btn-main').innerText = "Publicar Producto";
        document.getElementById('btn-cancel').style.display = "none";
        verificarNuevos();
    }

    db.ref('Productos').on('value', (snapshot) => {
        const lista = document.getElementById('lista-inventario');
        lista.innerHTML = "";
        snapshot.forEach((catSnap) => {
            catSnap.forEach((prodSnap) => {
                const p = prodSnap.val(); const id = prodSnap.key; const cat = catSnap.key;
                const precioMostrado = p.precioOferta ? `<span style="text-decoration:line-through; color:gray;">$${p.precio}</span> <span style="color:red; font-weight:bold;">$${p.precioOferta}</span>` : `$${p.precio}`;
                
                lista.innerHTML += `
                    <div class="producto-item">
                        <div class="info-admin">
                            <img src="${p.imagen}">
                            <div><strong>${p.Nombre}</strong><br><small>${cat} | ${p.subcategoria || 'Sin Carpeta'}</small><br><small>${precioMostrado}</small></div>
                        </div>
                        <div class="controles">
                            <input type="number" class="stock-input" value="${p.stock !== undefined ? p.stock : 10}" onchange="updateStockInd('${cat}','${id}',this.value)">
                            <button class="btn-edit" onclick='cargarEdicion("${cat}","${id}", ${JSON.stringify(p)})'>Editar</button>
                            <button class="btn-del" onclick="borrarInd('${cat}','${id}')">Borrar</button>
                        </div>
                    </div>`;
            });
        });
    });
    function updateStockInd(cat, id, v) { db.ref('Productos/'+cat+'/'+id).update({stock:parseInt(v)}); }
    function borrarInd(cat, id) { if(confirm("¿Borrar gorro definitivamente?")) db.ref('Productos/'+cat+'/'+id).remove(); }


    /* ========================================================
       LÓGICA PAQUETES MATCH (AHORA CON FOTOS INFINITAS)
       ======================================================== */
    function agregarInputFotoExtra(url = "") {
        const container = document.getElementById('contenedor-fotos-extra');
        const input = document.createElement('input');
        input.type = "text";
        input.className = "input-foto-dinamica";
        input.placeholder = "URL Foto extra (Ej: Gorro Individual)...";
        input.value = url;
        container.appendChild(input);
    }

    function guardarMatch() {
        const idExistente = document.getElementById('edit-match-id').value;
        const nombre = document.getElementById('match-nombre').value;
        const precio = document.getElementById('match-precio').value;
        const precioOferta = document.getElementById('match-precio-oferta').value;
        const stock = document.getElementById('match-stock').value;
        const imagen = document.getElementById('match-imagen').value;
        const desc = document.getElementById('match-desc').value;

        // Recolectar todas las fotos dinámicas
        let fotosExtraArray = [];
        const inputsFotos = document.querySelectorAll('.input-foto-dinamica');
        inputsFotos.forEach(input => {
            if(input.value.trim() !== "") fotosExtraArray.push(input.value.trim());
        });

        if(!nombre || !precio || !imagen) return alert("Llena nombre, precio normal y foto principal!");
        
        const idMatch = idExistente || nombre.replace(/\s+/g, '_').toLowerCase() + "_" + Date.now();
        
        db.ref('PaquetesMatch/' + idMatch).set({ 
            Nombre: nombre, 
            precioTotal: precio, 
            precioOferta: precioOferta || "", 
            stock: parseInt(stock), 
            imagenGrupal: imagen, 
            descripcion: desc,
            fotosExtra: fotosExtraArray // GUARDAMOS EL ARRAY COMPLETO
        }).then(() => { 
            alert(idExistente ? "Paquete actualizado con éxito" : "Paquete agregado exitosamente"); 
            cancelarEdicionMatch();
        });
    }

    function cargarEdicionMatch(id) {
        const data = cacheMatches[id];
        if(!data) return;

        document.getElementById('titulo-form-match').innerText = "📝 Editando Paquete: " + data.Nombre;
        document.getElementById('edit-match-id').value = id;
        document.getElementById('match-nombre').value = data.Nombre;
        document.getElementById('match-precio').value = data.precioTotal;
        document.getElementById('match-precio-oferta').value = data.precioOferta || "";
        document.getElementById('match-stock').value = data.stock !== undefined ? data.stock : 10;
        document.getElementById('match-imagen').value = data.imagenGrupal;
        document.getElementById('match-desc').value = data.descripcion || "";
        
        // Limpiar contenedor de fotos y cargar las que existan
        const containerFotos = document.getElementById('contenedor-fotos-extra');
        containerFotos.innerHTML = "";

        if(data.fotosExtra && data.fotosExtra.length > 0) {
            data.fotosExtra.forEach(url => agregarInputFotoExtra(url));
        } else {
            // Compatibilidad con los que guardaste antes de la actualización
            if(data.img2) agregarInputFotoExtra(data.img2);
            if(data.img3) agregarInputFotoExtra(data.img3);
            if(data.img4) agregarInputFotoExtra(data.img4);
        }

        document.getElementById('btn-match-main').innerText = "Guardar Cambios del Paquete";
        document.getElementById('btn-match-cancel').style.display = "block";
        window.scrollTo(0, document.getElementById('titulo-form-match').offsetTop - 20); 
    }

    function cancelarEdicionMatch() {
        document.getElementById('titulo-form-match').innerText = "🔥 Añadir Paquete MATCH (Equipos)";
        document.getElementById('edit-match-id').value = "";
        document.getElementById('match-nombre').value = "";
        document.getElementById('match-precio').value = "";
        document.getElementById('match-precio-oferta').value = "";
        document.getElementById('match-stock').value = "10";
        document.getElementById('match-imagen').value = "";
        document.getElementById('match-desc').value = "";
        document.getElementById('contenedor-fotos-extra').innerHTML = ""; // Limpiamos inputs
        document.getElementById('btn-match-main').innerText = "Publicar Paquete Match";
        document.getElementById('btn-match-cancel').style.display = "none";
    }

    db.ref('PaquetesMatch').on('value', (snapshot) => {
        const listaMatch = document.getElementById('lista-match');
        listaMatch.innerHTML = "";
        cacheMatches = {};

        snapshot.forEach((child) => {
            const p = child.val(); const id = child.key;
            cacheMatches[id] = p;

            const precioMostrado = p.precioOferta 
                ? `<span style="text-decoration:line-through; color:gray;">$${p.precioTotal}</span> <span style="color:red; font-weight:bold;">$${p.precioOferta}</span>` 
                : `$${p.precioTotal}`;

            listaMatch.innerHTML += `
                <div class="producto-item" style="border-left-color:var(--azul-match)">
                    <div class="info-admin"><img src="${p.imagenGrupal}">
                    <div><strong>${p.Nombre}</strong><br><small>MXN ${precioMostrado}</small></div></div>
                    <div class="controles">
                        Stock: <input type="number" class="stock-input" value="${p.stock !== undefined ? p.stock : 10}" onchange="updateStockMatch('${id}',this.value)">
                        <button class="btn-edit" onclick="cargarEdicionMatch('${id}')">Editar</button>
                        <button class="btn-del" onclick="borrarMatch('${id}')">Borrar</button>
                    </div>
                </div>`;
        });
    });
    function updateStockMatch(id, v) { db.ref('PaquetesMatch/'+id).update({stock:parseInt(v)}); }
    function borrarMatch(id) { if(confirm("¿Borrar paquete definitivamente?")) db.ref('PaquetesMatch/'+id).remove(); }

    /* ========================================================
       LÓGICA GALERÍA DE FOTOS
       ======================================================== */
    function guardarFotoGaleria() {
        const imagen = document.getElementById('galeria-imagen').value;
        if(!imagen) return alert("Pega la URL!");
        const idFoto = "galeria_" + Date.now();
        db.ref('GaleriaMatch/' + idFoto).set({ imagen: imagen }).then(() => { location.reload(); });
    }
    db.ref('GaleriaMatch').on('value', (snapshot) => {
        const listaGaleria = document.getElementById('lista-galeria');
        listaGaleria.innerHTML = "";
        snapshot.forEach((child) => {
            const f = child.val(); const id = child.key;
            listaGaleria.innerHTML += `<div class="producto-item" style="border-left-color:var(--verde-gallery)"><div class="info-admin"><img src="${f.imagen}"></div><div class="controles"><button class="btn-del" onclick="borrarFotoGaleria('${id}')">Borrar</button></div></div>`;
        });
    });
    function borrarFotoGaleria(id) { if(confirm("¿Quitar foto?")) db.ref('GaleriaMatch/'+id).remove(); }
</script>
</body>
</html>
