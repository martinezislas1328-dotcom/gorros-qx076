<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Maestro | Gorros QX076</title>
    <style>
        :root { --vino: #850E35; --rosa: #EE6983; --hueso: #FCF5EE; }
        body { font-family: 'Montserrat', sans-serif; background: var(--hueso); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; border-top: 5px solid var(--vino); }
        h2 { color: var(--vino); margin: 0 0 20px 0; font-size: 1.5rem; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-guardar { background: var(--vino); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-guardar:hover { background: #610a26; transform: translateY(-2px); }
        .producto-item { background: white; padding: 15px; margin-bottom: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-admin { display: flex; align-items: center; gap: 15px; }
        .info-admin img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }
        .controles { display: flex; gap: 8px; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .stock-input { width: 60px !important; text-align: center; margin: 0 !important; padding: 5px !important; }
        .oferta-input { border: 2px solid var(--rosa) !important; background: #fff5f7; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel" id="form-panel">
        <h2 id="titulo-form">✨ Añadir Nuevo Producto</h2>
        <input type="hidden" id="edit-id"> 
        <input type="hidden" id="edit-cat"> 
        
        <label>Nombre del Gorro</label>
        <input type="text" id="nombre" placeholder="Ej: Ariel - La Sirenita">
        
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Precio Normal ($)</label>
                <input type="number" id="precio" placeholder="120">
            </div>
            <div style="flex: 1;">
                <label>Precio Oferta (Opcional)</label>
                <input type="number" id="precioOferta" class="oferta-input" placeholder="Ej: 100">
            </div>
        </div>
        
        <label>URL de la Imagen (Postimg)</label>
        <input type="text" id="imagen" placeholder="https://i.postimg.cc/...">
        
        <label>Categoría Principal</label>
        <select id="categoria">
            <option value="Toons_Icons">Personajes Animados (Toons)</option>
            <option value="Art_Masterpieces">Arte y Cuadros (Art)</option>
            <option value="Marble_Luxury">Línea Mármol (Marble Luxury)</option>
            <option value="Nature_Wildlife">Animales y Flores</option>
            <option value="Essentials">Básicos y Corazones</option>
        </select>

        <label>Sub-clasificación (Carpeta de Filtro)</label>
        <select id="subcategoria">
            <option value="Todos">Ninguna / Otros</option>
            <option value="Stitch">Stitch</option>
            <option value="Snoopy">Snoopy</option>
            <option value="Princesas">Princesas</option>
            <option value="Bob Esponja">Bob Esponja</option>
            <option value="Chicas Superpoderosas">Chicas Superpoderosas</option>
            <option value="Minions">Minions</option>
        </select>

        <label>Stock</label>
        <input type="number" id="stock" value="10">

        <button class="btn-guardar" onclick="guardarProducto()" id="btn-main">Publicar Producto</button>
        <button id="btn-cancel" style="display:none; background:#999; margin-top:10px; border:none; color:white; padding:10px; border-radius:8px; width:100%; cursor:pointer;" onclick="cancelarEdicion()">Cancelar Edición</button>
    </div>

    <div class="panel">
        <h2>📦 Inventario Completo</h2>
        <div id="lista-inventario">Cargando...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDjJGxz3rqwKRY1mQsakSqJPGVfF_rYdp0",
        authDomain: "gorrosqx.firebaseapp.com",
        databaseURL: "https://gorrosqx-default-rtdb.firebaseio.com",
        projectId: "gorrosqx",
        storageBucket: "gorrosqx.firebasestorage.app",
        messagingSenderId: "675780481076",
        appId: "1:675780481076:web:d048283127414361583a61"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function guardarProducto() {
        const idExistente = document.getElementById('edit-id').value;
        const catAnterior = document.getElementById('edit-cat').value;
        const nombre = document.getElementById('nombre').value;
        const precio = document.getElementById('precio').value;
        const precioOferta = document.getElementById('precioOferta').value;
        const imagen = document.getElementById('imagen').value;
        const cat = document.getElementById('categoria').value;
        const sub = document.getElementById('subcategoria').value;
        const stock = document.getElementById('stock').value;

        if(!nombre || !precio || !imagen) return alert("Completa los datos");

        if(idExistente && catAnterior !== cat) {
            db.ref('Productos/' + catAnterior + '/' + idExistente).remove();
        }

        const idFinal = idExistente || nombre.replace(/\s+/g, '_').toLowerCase();

        db.ref('Productos/' + cat + '/' + idFinal).set({
            Nombre: nombre,
            precio: precio,
            precioOferta: precioOferta || "",
            imagen: imagen,
            categoria: cat,
            subcategoria: sub,
            stock: parseInt(stock)
        }).then(() => {
            alert("¡Base de datos actualizada!");
            cancelarEdicion();
        });
    }

    function cargarEdicion(cat, id, data) {
        document.getElementById('titulo-form').innerText = "📝 Editando: " + data.Nombre;
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-cat').value = cat;
        document.getElementById('nombre').value = data.Nombre || data.nombre;
        document.getElementById('precio').value = data.precio || data.Precio;
        document.getElementById('precioOferta').value = data.precioOferta || "";
        document.getElementById('imagen').value = data.imagen || data.Imagen;
        document.getElementById('categoria').value = cat;
        document.getElementById('subcategoria').value = data.subcategoria || "Todos";
        document.getElementById('stock').value = data.stock;
        document.getElementById('btn-main').innerText = "Guardar Cambios";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelarEdicion() {
        document.getElementById('titulo-form').innerText = "✨ Añadir Nuevo Producto";
        document.getElementById('edit-id').value = "";
        document.getElementById('edit-cat').value = "";
        document.getElementById('nombre').value = "";
        document.getElementById('precio').value = "";
        document.getElementById('precioOferta').value = "";
        document.getElementById('imagen').value = "";
        document.getElementById('subcategoria').value = "Todos";
        document.getElementById('stock').value = "10";
        document.getElementById('btn-main').innerText = "Publicar Producto";
        document.getElementById('btn-cancel').style.display = "none";
    }

    db.ref('Productos').on('value', (snapshot) => {
        const lista = document.getElementById('lista-inventario');
        lista.innerHTML = "";
        snapshot.forEach((catSnap) => {
            catSnap.forEach((prodSnap) => {
                const p = prodSnap.val();
                const id = prodSnap.key;
                const cat = catSnap.key;
                const precioMostrado = p.precioOferta ? `<span style="text-decoration:line-through; color:gray;">$${p.precio}</span> <span style="color:red; font-weight:bold;">$${p.precioOferta}</span>` : `$${p.precio}`;
                
                lista.innerHTML += `
                    <div class="producto-item">
                        <div class="info-admin">
                            <img src="${p.imagen}">
                            <div><strong>${p.Nombre}</strong><br><small>${cat} | ${p.subcategoria || 'Sin Carpeta'}</small><br><small>${precioMostrado}</small></div>
                        </div>
                        <div class="controles">
                            <input type="number" class="stock-input" value="${p.stock}" onchange="updateStock('${cat}','${id}',this.value)">
                            <button class="btn-edit" onclick='cargarEdicion("${cat}","${id}", ${JSON.stringify(p)})'>Editar</button>
                            <button class="btn-del" onclick="borrar('${cat}','${id}')">Eliminar</button>
                        </div>
                    </div>`;
            });
        });
    });

    function updateStock(cat, id, v) { db.ref('Productos/'+cat+'/'+id).update({stock:parseInt(v)}); }
    function borrar(cat, id) { if(confirm("¿Borrar?")) db.ref('Productos/'+cat+'/'+id).remove(); }
</script>
</body>
</html>
